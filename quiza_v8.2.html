<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PicTour v0.1</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;900&display=swap');
:root {
  --bg:#f5f0e8; --surface:#faf7f2; --surface2:#ede8de;
  --border:#c8bfaa; --accent:#7a6a52; --accent2:#3a9a4a;
  --wrong:#9e5050; --text:#2e2a22; --muted:#8a7f6e;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;display:flex;flex-direction:column;align-items:center;}
header{width:100%;max-width:700px;padding:14px 20px 0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.screen{display:none;flex-direction:column;align-items:center;width:100%;max-width:700px;flex:1;min-height:0;overflow-y:auto;}
.screen.active{display:flex;}

/* ── TOPIC SCREEN ── */
#topic-screen{padding:20px 16px;gap:12px;}
.topic-title{font-size:22px;font-weight:900;text-align:center;}
.topic-sub{font-size:13px;color:var(--muted);text-align:center;}
.topic-list{width:100%;display:flex;flex-direction:column;gap:8px;}
.topic-item{width:100%;padding:14px 16px;border-radius:12px;border:2px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all 0.15s;-webkit-tap-highlight-color:transparent;}
.topic-item.selected{border-color:var(--accent2);background:rgba(58,154,74,0.08);}
.topic-item .topic-name{font-size:15px;font-weight:700;}
.topic-item .topic-count{font-size:12px;color:var(--muted);}
.topic-item .check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;}
.topic-item.selected .check{background:var(--accent2);border-color:var(--accent2);color:#fff;}
.btn-primary{width:100%;padding:14px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-family:'Heebo',sans-serif;font-size:16px;font-weight:700;cursor:pointer;}
.btn-primary:disabled{opacity:0.3;pointer-events:none;}
.btn-select-all{width:100%;padding:10px;border-radius:10px;border:1px solid var(--border);background:none;font-family:'Heebo',sans-serif;font-size:13px;color:var(--muted);cursor:pointer;}

/* ── MODE SCREEN ── */
#mode-screen{padding:24px 16px;gap:16px;justify-content:center;}
.mode-btn{width:100%;padding:22px;border-radius:16px;border:2px solid var(--border);background:var(--surface);font-family:'Heebo',sans-serif;font-size:18px;font-weight:700;cursor:pointer;text-align:center;transition:all 0.15s;}
.mode-btn:active{transform:scale(0.98);}
.mode-btn.cards{border-color:var(--accent);}
.mode-btn.quiz{border-color:var(--accent2);}
.mode-label{font-size:12px;color:var(--muted);margin-top:4px;}

/* ── QUIZ OPTIONS SCREEN ── */
#quiz-options-screen{padding:24px 16px;gap:14px;}
.qt-type-btn{padding:14px;border-radius:12px;border:2px solid var(--border);background:var(--surface2);font-family:'Heebo',sans-serif;font-size:15px;font-weight:600;cursor:pointer;color:var(--text);width:100%;}
.qt-type-btn.selected{border-color:var(--accent2);background:rgba(58,154,74,0.1);color:#2a7a3a;}
.count-btn{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);font-family:'Heebo',sans-serif;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);}
.count-btn.active-count{border-color:var(--accent2);color:var(--accent2);background:rgba(58,154,74,0.1);}
.section-label{font-size:12px;color:var(--muted);text-align:center;}

/* ── APP SCREEN ── */
#app-screen{padding:10px 14px;gap:8px;}
.progress-row{width:100%;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.progress-bar{flex:1;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.4s;}
.progress-label{font-size:12px;color:var(--muted);min-width:50px;}
.score-row{display:flex;gap:16px;font-size:13px;color:var(--muted);flex-shrink:0;}
.score-row span{color:var(--text);font-weight:700;}
.card-wrap{width:100%;flex:1;position:relative;touch-action:none;min-height:0;cursor:grab;}
.card-face{position:absolute;inset:0;border-radius:16px;border:1px solid var(--border);overflow:hidden;transition:opacity 0.25s;}
.card-front{background:var(--surface);display:flex;align-items:center;justify-content:center;opacity:1;z-index:2;}
.card-front img{width:100%;height:100%;object-fit:contain;display:block;transform-origin:center center;will-change:transform;}
.card-back{background:var(--surface2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:28px;opacity:0;z-index:1;}
.card-wrap.flipped .card-front{opacity:0;z-index:1;}
.card-wrap.flipped .card-back{opacity:1;z-index:2;}
.answer-text{font-size:clamp(20px,4vw,32px);font-weight:700;text-align:center;line-height:1.3;}
.flip-hint{font-size:11px;color:var(--muted);}
.tutorial-hint{text-align:center;width:100%;padding:2px 0 0;font-size:12px;color:#7aa3d6;transition:color 0.4s;flex-shrink:0;}
.tutorial-hint.used{color:var(--muted);}
.actions{width:100%;display:flex;gap:8px;flex-shrink:0;}
.btn-action{flex:1;padding:10px 6px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:'Heebo',sans-serif;font-size:13px;font-weight:500;cursor:pointer;}
.quiz-options{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:5px;flex-shrink:0;}
.quiz-opt{padding:7px 4px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-family:'Heebo',sans-serif;font-size:12px;font-weight:600;cursor:pointer;text-align:center;line-height:1.2;}
.quiz-opt.correct{border-color:var(--accent2);background:rgba(58,154,74,0.12);color:#2a7a3a;}
.quiz-opt.wrong{border-color:var(--wrong);background:rgba(158,80,80,0.1);color:var(--wrong);}
.quiz-opt.selected{border-color:var(--accent);background:rgba(122,106,82,0.1);color:var(--accent);}
.quiz-opt.disabled{cursor:default;opacity:0.7;}
.quiz-actions{width:100%;display:flex;gap:8px;flex-shrink:0;}

/* ── DONE SCREEN ── */
#done-screen{padding:30px 20px;gap:18px;justify-content:center;text-align:center;}
.done-score{font-size:56px;font-weight:900;color:var(--accent);}
.done-sub{font-size:14px;color:var(--muted);}
.done-history{width:100%;max-width:320px;max-height:160px;overflow-y:auto;}
.done-cta{display:flex;flex-direction:column;gap:10px;width:100%;max-width:280px;}
.btn-restart{width:100%;padding:13px;border-radius:12px;border:1px solid var(--border);background:var(--accent);color:#fff;font-family:'Heebo',sans-serif;font-size:15px;font-weight:600;cursor:pointer;}
.btn-next{background:var(--accent2);border-color:var(--accent2);}
.btn-ghost{background:transparent;color:var(--muted);border-color:var(--border);}

/* ── LOADING ── */
#loading-screen{justify-content:center;align-items:center;gap:16px;padding:30px;}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── ANIMATIONS ── */
@keyframes checkPop{0%{opacity:0;transform:scale(0.2);}30%{opacity:1;transform:scale(1.3);}55%{transform:scale(0.95);}75%{opacity:1;}100%{opacity:0;transform:scale(1.1) translateY(-20px);}}
@keyframes xPop{0%{opacity:0;transform:scale(0.2);}30%{opacity:1;transform:scale(1.3);}55%{transform:scale(0.95);}75%{opacity:1;}100%{opacity:0;transform:scale(1.1) translateY(-20px);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
@keyframes slideRight{0%{transform:translateX(0);opacity:1;}100%{transform:translateX(120%);opacity:0;}}
@keyframes slideLeft{0%{transform:translateX(0);opacity:1;}100%{transform:translateX(-120%);opacity:0;}}
@keyframes slideInRight{0%{transform:translateX(-120%);opacity:0;}100%{transform:translateX(0);opacity:1;}}
@media(max-width:500px){.quiz-options{grid-template-columns:1fr;}}
</style>
</head>
<body>

<header>
  <button id="home-btn" onclick="goHome()" style="display:none;background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:8px;font-family:'Heebo',sans-serif;font-size:12px;color:var(--muted)">← חזור</button>
  <div style="display:flex;align-items:flex-end;gap:5px">
    <span style="font-size:10px;opacity:0.4;font-family:'Heebo',sans-serif;line-height:1;padding-bottom:2px">v0.1</span>
    <span style="font-size:16px;font-weight:900;letter-spacing:0.04em;line-height:1;padding-bottom:1px">PicTour</span>
  </div>
</header>

<!-- LOADING -->
<div id="loading-screen" class="screen active">
  <div class="spinner"></div>
  <div id="loading-text" style="font-size:14px;color:var(--muted)">טוען נושאים...</div>
</div>

<!-- TOPIC SELECT -->
<div id="topic-screen" class="screen">
  <div class="topic-title">בחר נושא</div>
  <div class="topic-sub">אפשר לבחור יותר מאחד</div>
  <div class="topic-list" id="topic-list"></div>
  <button class="btn-select-all" onclick="toggleAll()">בחר הכל</button>
  <button class="btn-primary" id="topic-continue-btn" onclick="goToMode()" disabled>המשך</button>
</div>

<!-- MODE SELECT -->
<div id="mode-screen" class="screen">
  <div style="font-size:18px;font-weight:700;text-align:center">איך תרצה ללמוד?</div>
  <button class="mode-btn cards" onclick="startCards()">
    🃏 כרטיסיות
    <div class="mode-label">הפוך, בדוק את עצמך</div>
  </button>
  <button class="mode-btn quiz" onclick="goToQuizOptions()">
    🧠 בוחן
    <div class="mode-label">שאלות + תשובות</div>
  </button>
</div>

<!-- QUIZ OPTIONS -->
<div id="quiz-options-screen" class="screen">
  <div style="font-size:16px;font-weight:700;text-align:center">הגדרות בוחן</div>
  <div class="section-label">סוג שאלות</div>
  <div style="display:flex;flex-direction:column;gap:8px;width:100%">
    <button class="qt-type-btn selected" id="qt-closed" onclick="setQuizType('closed')">סגור — 4 אפשרויות</button>
    <button class="qt-type-btn" id="qt-open" onclick="setQuizType('open')">פתוח — הקלדה חופשית</button>
  </div>
  <div class="section-label">כמה שאלות?</div>
  <div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;width:100%">
    <button onclick="setQuizCount(10,this)" class="count-btn active-count">10</button>
    <button onclick="setQuizCount(20,this)" class="count-btn">20</button>
    <button onclick="setQuizCount(30,this)" class="count-btn">30</button>
    <button onclick="setQuizCount(40,this)" class="count-btn">40</button>
    <button onclick="setQuizCount(50,this)" class="count-btn">50</button>
    <button onclick="setQuizCount(9999,this)" class="count-btn">הכל</button>
  </div>
  <button class="btn-primary" onclick="startQuiz()">התחל בוחן</button>
  <button class="btn-ghost btn-restart" onclick="showScreen('mode-screen')">חזרה</button>
</div>

<!-- APP -->
<div id="app-screen" class="screen">
  <div class="progress-row">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="progress-label" id="progress-label">0 / 0</div>
  </div>
  <div class="score-row" id="score-row" style="display:none">
    נכון: <span id="score-correct">0</span>&nbsp; שגוי: <span id="score-wrong">0</span>
  </div>
  <div class="card-wrap" id="card-wrap">
    <div class="card-face card-front" id="card-front">
      <img id="card-img" src="" alt="">
    </div>
    <div class="card-face card-back">
      <div class="flip-hint">תשובה</div>
      <div class="answer-text" id="card-answer"></div>
    </div>
  </div>
  <div class="tutorial-hint" id="tutorial-hint">החלק שמאל/ימין לכרטיס הבא • לחץ פעמיים להגדלה</div>
  <div class="quiz-options" id="quiz-options" style="display:none"></div>
  <div class="actions" id="flash-actions">
    <button class="btn-action" onclick="markWrong()">שאל שוב</button>
    <button class="btn-action" onclick="markCorrect()">✓ ידעתי</button>
  </div>
  <div class="quiz-actions" id="quiz-actions" style="display:none">
    <button class="btn-action" onclick="skipCard()">דלג</button>
    <button class="btn-action" id="confirm-btn" onclick="confirmQuiz()" style="opacity:0.3;pointer-events:none">המשך</button>
  </div>
</div>

<!-- DONE -->
<div id="done-screen" class="screen">
  <div style="font-size:26px;font-weight:900;">סיימת!</div>
  <div class="done-score" id="done-score"></div>
  <div class="done-sub" id="done-sub"></div>
  <div class="done-history" id="done-history"></div>
  <div class="done-cta" id="done-cta"></div>
</div>

<script>
// ── CONFIG ──
const GITHUB_API = 'https://api.github.com/repos/barakclinic-ship-it/quiza-anatomy/contents/images';
const BASE_URL   = 'https://barakclinic-ship-it.github.io/quiza-anatomy/images';
const VALID_EXT  = /\.(jpg|jpeg|png|gif|webp)$/i;

// ── STATE ──
let topics = [];           // [{name, images:[{file,name}]}]
let selectedTopics = new Set();
let allCards = [];
let deck = [], repeatQueue = [], current = null;
let seen = 0, roundTotal = 0;
let mode = 'quiz', quizType = 'closed', quizCount = 10;
let scores = {correct:0, wrong:0};
let quizHistory = [];
let quizAnswered = false, selectedQuizBtn = null;
let autoTimer = null;
let tutorialShown = localStorage.getItem('pictour_tutorial') === '1';

// ── SCREENS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const showHome = id !== 'loading-screen' && id !== 'topic-screen';
  document.getElementById('home-btn').style.display = showHome ? '' : 'none';
}

function goHome() {
  if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
  const wp = document.getElementById('wrong-popup'); if (wp) wp.remove();
  showScreen('topic-screen');
}

// ── LOAD TOPICS FROM GITHUB ──
async function loadTopics() {
  showScreen('loading-screen');
  document.getElementById('loading-text').textContent = 'טוען נושאים...';
  try {
    const res = await fetch(GITHUB_API, {headers:{'Accept':'application/vnd.github.v3+json'}});
    if (!res.ok) throw new Error('שגיאת רשת: ' + res.status);
    const items = await res.json();

    const subdirs = items.filter(i => i.type === 'dir');
    const rootFiles = items.filter(i => i.type === 'file' && VALID_EXT.test(i.name));

    topics = [];

    if (rootFiles.length) {
      topics.push({name:'General', images: rootFiles.map(f => ({
        file: f.name,
        name: f.name.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ').trim()
      }))});
    }

    for (const dir of subdirs) {
      document.getElementById('loading-text').textContent = 'טוען ' + dir.name + '...';
      const r = await fetch(dir.url, {headers:{'Accept':'application/vnd.github.v3+json'}});
      if (!r.ok) continue;
      const files = (await r.json()).filter(i => i.type==='file' && VALID_EXT.test(i.name));
      if (files.length) {
        topics.push({name: dir.name, images: files.map(f => ({
          file: dir.name + '/' + f.name,
          name: f.name.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ').trim()
        }))});
      }
    }

    if (!topics.length) throw new Error('לא נמצאו תמונות ב-GitHub');
    renderTopics();
    showScreen('topic-screen');
  } catch(err) {
    document.getElementById('loading-text').textContent = '❌ ' + err.message;
    setTimeout(() => {
      const btn = document.createElement('button');
      btn.className = 'btn-primary';
      btn.textContent = 'נסה שוב';
      btn.onclick = loadTopics;
      document.getElementById('loading-screen').appendChild(btn);
    }, 500);
  }
}

function renderTopics() {
  const list = document.getElementById('topic-list');
  list.innerHTML = '';
  topics.forEach((t, i) => {
    const el = document.createElement('div');
    el.className = 'topic-item';
    el.dataset.idx = i;
    el.innerHTML = `
      <div>
        <div class="topic-name">${t.name}</div>
        <div class="topic-count">${t.images.length} תמונות</div>
      </div>
      <div class="check">✓</div>`;
    el.onclick = () => toggleTopic(i, el);
    list.appendChild(el);
  });
}

function toggleTopic(idx, el) {
  if (selectedTopics.has(idx)) {
    selectedTopics.delete(idx);
    el.classList.remove('selected');
  } else {
    selectedTopics.add(idx);
    el.classList.add('selected');
  }
  document.getElementById('topic-continue-btn').disabled = selectedTopics.size === 0;
}

function toggleAll() {
  if (selectedTopics.size === topics.length) {
    selectedTopics.clear();
    document.querySelectorAll('.topic-item').forEach(el => el.classList.remove('selected'));
  } else {
    topics.forEach((_, i) => selectedTopics.add(i));
    document.querySelectorAll('.topic-item').forEach(el => el.classList.add('selected'));
  }
  document.getElementById('topic-continue-btn').disabled = selectedTopics.size === 0;
}

function goToMode() {
  // בנה allCards מהנושאים שנבחרו
  allCards = [];
  selectedTopics.forEach(idx => {
    topics[idx].images.forEach(img => {
      allCards.push({
        name: img.name,
        url: BASE_URL + '/' + img.file.split('/').map(encodeURIComponent).join('/')
      });
    });
  });
  showScreen('mode-screen');
}

// ── MODE ──
function startCards() {
  mode = 'flash';
  startRound();
}

function goToQuizOptions() {
  mode = 'quiz';
  showScreen('quiz-options-screen');
}

function setQuizType(type) {
  quizType = type;
  document.querySelectorAll('.qt-type-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('qt-'+type).classList.add('selected');
}

function setQuizCount(n, btn) {
  quizCount = n;
  document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('active-count'));
  if (btn) btn.classList.add('active-count');
}

function startQuiz() {
  startRound();
}

// ── ROUND ──
function startRound() {
  showScreen('app-screen');
  document.getElementById('home-btn').style.display = '';
  let pool = shuffle([...allCards]);
  if (quizCount < pool.length) pool = pool.slice(0, quizCount);
  deck = pool;
  roundTotal = pool.length;
  repeatQueue = [];
  seen = 0;
  scores = {correct:0, wrong:0};
  updateScoreRow();
  pickNext();
}

function pickNext() {
  if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
  const wp = document.getElementById('wrong-popup'); if (wp) wp.remove();
  if (deck.length === 0) {
    if (mode === 'flash' && repeatQueue.length > 0) {
      deck = shuffle([...repeatQueue]);
      repeatQueue = [];
    } else {
      showDone();
      return;
    }
  }
  const i = Math.floor(Math.random() * deck.length);
  current = deck.splice(i, 1)[0];
  seen++;
  showCard();
}

function showCard() {
  resetZoom();
  const wp = document.getElementById('wrong-popup'); if (wp) wp.remove();
  document.getElementById('card-wrap').classList.remove('flipped');
  document.getElementById('card-img').src = current.url;
  document.getElementById('card-answer').textContent = current.name;
  updateProgress();

  if (mode === 'flash') {
    document.getElementById('quiz-options').style.display = 'none';
    document.getElementById('flash-actions').style.display = 'flex';
    document.getElementById('quiz-actions').style.display = 'none';
    document.getElementById('score-row').style.display = 'none';
  } else {
    document.getElementById('flash-actions').style.display = 'none';
    document.getElementById('quiz-actions').style.display = 'flex';
    document.getElementById('score-row').style.display = 'flex';
    quizAnswered = false;
    selectedQuizBtn = null;
    const cb = document.getElementById('confirm-btn');
    cb.style.opacity = '0.3'; cb.style.pointerEvents = 'none';
    cb.style.background = ''; cb.style.color = ''; cb.style.borderColor = '';
    cb.textContent = 'המשך'; cb.onclick = confirmQuiz;
    buildQuizOptions();
    document.getElementById('quiz-options').style.display = 'grid';
  }
}

// ── FLASH CARD ACTIONS ──
function markCorrect() {
  showCheckmark();
  autoTimer = setTimeout(pickNext, 600);
}

function markWrong() {
  repeatQueue.push(current);
  pickNext();
}

function skipCard() {
  if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
  const wp = document.getElementById('wrong-popup'); if (wp) wp.remove();
  deck.push(current);
  pickNext();
}

// ── QUIZ ──
function buildQuizOptions() {
  const pool = allCards.filter(c => c !== current);
  const stopWords = new Set(['of','the','and','or','a','an','left','right','upper','lower','anterior','posterior','medial','lateral','superior','inferior']);
  function kw(name){return name.toLowerCase().split(/\s+/).filter(w=>w.length>2&&!stopWords.has(w));}
  const ckw = kw(current.name);
  function sim(c){return kw(c.name).filter(w=>ckw.includes(w)).length;}
  const scored = shuffle([...pool]).map(c=>({c,s:sim(c)}));
  scored.sort((a,b)=>b.s-a.s);
  const distractors = scored.slice(0,3).map(s=>s.c);
  const opts = shuffle([current,...distractors]);
  const container = document.getElementById('quiz-options');
  container.innerHTML = '';
  opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quiz-opt';
    btn.textContent = opt.name;
    btn.dataset.isCorrect = opt === current ? '1' : '0';
    btn.onclick = () => {
      if (quizAnswered) return;
      document.querySelectorAll('.quiz-opt').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedQuizBtn = btn;
      const cb = document.getElementById('confirm-btn');
      cb.style.opacity = '1'; cb.style.pointerEvents = 'auto';
    };
    container.appendChild(btn);
  });
}

function confirmQuiz() {
  if (quizAnswered || !selectedQuizBtn) return;
  quizAnswered = true;
  const isCorrect = selectedQuizBtn.dataset.isCorrect === '1';
  document.querySelectorAll('.quiz-opt').forEach(b=>{
    b.classList.add('disabled'); b.classList.remove('selected');
    if (b.dataset.isCorrect==='1') b.classList.add('correct');
  });
  if (!isCorrect) selectedQuizBtn.classList.add('wrong');
  const cb = document.getElementById('confirm-btn');
  cb.style.opacity = '1'; cb.style.pointerEvents = 'auto';
  if (isCorrect) {
    scores.correct++; updateScoreRow();
    showCheckmark();
    cb.textContent = 'הבא'; cb.onclick = ()=>pickNext();
    autoTimer = setTimeout(pickNext, 900);
  } else {
    scores.wrong++; updateScoreRow();
    cb.textContent = 'הבנתי';
    cb.style.background='var(--wrong)'; cb.style.color='#fff'; cb.style.borderColor='var(--wrong)';
    cb.onclick = ()=>{const wp=document.getElementById('wrong-popup');if(wp)wp.remove();pickNext();};
    autoTimer = setTimeout(()=>showWrongPopup(current.name), 500);
  }
}

// ── DONE ──
function showDone() {
  showScreen('done-screen');
  const counts = [10,20,30,40,50];
  const idx = counts.indexOf(roundTotal);
  if (mode === 'quiz') {
    const total = scores.correct + scores.wrong;
    const pct = total ? Math.round(scores.correct/total*100) : 0;
    const emoji = pct===100?'👑':pct>=90?'🌟':pct>=75?'🔥':pct>=60?'💪':pct>=40?'😅':pct>=20?'💀':'⚰️';
    quizHistory.push({count:roundTotal, type:quizType==='open'?'פתוח':'סגור', pct, emoji});
    document.getElementById('done-score').textContent = pct + '%';
    document.getElementById('done-sub').textContent = scores.correct + ' נכון מתוך ' + total;
    const histHtml = quizHistory.slice().reverse().map((h,i)=>
      `<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px">
        <span style="color:var(--muted)">${quizHistory.length-i}. ${h.count} שאלות ${h.type}</span>
        <span style="font-weight:700">${h.pct}% ${h.emoji}</span>
      </div>`).join('');
    document.getElementById('done-history').innerHTML = histHtml;
    let nextHtml = '';
    if (idx>=0 && idx<counts.length-1)
      nextHtml = `<button class="btn-restart btn-next" onclick="quizCount=${counts[idx+1]};startQuiz()">מדרגה הבאה — ${counts[idx+1]} שאלות ↑</button>`;
    document.getElementById('done-cta').innerHTML = nextHtml +
      `<button class="btn-restart" onclick="startQuiz()">שחק שוב — ${roundTotal} שאלות</button>` +
      `<button class="btn-restart btn-ghost" onclick="goHome()">בחר נושא אחר</button>`;
  } else {
    document.getElementById('done-score').textContent = '✓';
    document.getElementById('done-sub').textContent = 'עברת על ' + seen + ' כרטיסיות';
    document.getElementById('done-cta').innerHTML =
      `<button class="btn-restart" onclick="startCards()">שוב מהתחלה</button>` +
      `<button class="btn-restart btn-ghost" onclick="goHome()">בחר נושא אחר</button>`;
  }
}

// ── PROGRESS ──
function updateProgress() {
  const pct = roundTotal ? ((seen-1)/roundTotal)*100 : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = seen + ' / ' + roundTotal;
}

function updateScoreRow() {
  document.getElementById('score-row').style.display = mode==='quiz' ? 'flex' : 'none';
  document.getElementById('score-correct').textContent = scores.correct;
  document.getElementById('score-wrong').textContent = scores.wrong;
}

// ── ANIMATIONS ──
function showCheckmark() {
  const el = document.createElement('div');
  el.style.cssText = 'position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:100;';
  el.innerHTML = '<div style="font-size:160px;color:#2ecc40;filter:drop-shadow(0 0 30px #2ecc40cc);animation:checkPop 0.9s ease forwards">✓</div>';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 900);
}

function showWrongPopup(name) {
  const existing = document.getElementById('wrong-popup'); if (existing) existing.remove();
  const xEl = document.createElement('div');
  xEl.style.cssText = 'position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:100;';
  xEl.innerHTML = '<div style="font-size:140px;color:var(--wrong);animation:xPop 0.9s ease forwards">✕</div>';
  document.body.appendChild(xEl);
  setTimeout(()=>xEl.remove(), 900);
  const bar = document.createElement('div');
  bar.id = 'wrong-popup';
  bar.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:200;padding:10px 16px;background:rgba(90,122,90,0.95);display:flex;align-items:center;gap:12px;box-shadow:0 2px 12px rgba(0,0,0,0.2);';
  bar.innerHTML = `<div style="flex:1;text-align:right"><div style="font-size:11px;color:rgba(255,255,255,0.7);margin-bottom:2px">התשובה הנכונה</div><div style="font-size:16px;font-weight:700;color:#fff">${name}</div></div>`;
  document.body.appendChild(bar);
}

// ── SWIPE ──
let swipeStartX = 0, swipeStartY = 0, isSwiping = false;
const cardWrap = document.getElementById('card-wrap');

cardWrap.addEventListener('touchstart', e => {
  if (e.touches.length !== 1) return;
  swipeStartX = e.touches[0].clientX;
  swipeStartY = e.touches[0].clientY;
  isSwiping = false;
}, {passive:true});

cardWrap.addEventListener('touchmove', e => {
  if (e.touches.length !== 1 || zoomScale > 1) return;
  const dx = e.touches[0].clientX - swipeStartX;
  const dy = e.touches[0].clientY - swipeStartY;
  if (!isSwiping && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 10) isSwiping = true;
  if (isSwiping) e.preventDefault();
}, {passive:false});

cardWrap.addEventListener('touchend', e => {
  if (!isSwiping || zoomScale > 1) return;
  const dx = e.changedTouches[0].clientX - swipeStartX;
  if (Math.abs(dx) > 60) {
    if (mode === 'flash') {
      if (dx > 0) markCorrect();
      else markWrong();
    } else {
      if (Math.abs(dx) > 80) skipCard();
    }
  }
  isSwiping = false;
}, {passive:true});

// ── PINCH ZOOM ──
let zoomScale=1, panX=0, panY=0, rotation=0;
let lastDist=null, lastMidX=0, lastMidY=0, lastAngle=null;
let isPinching=false, pinchStarted=false;
function applyZoom(){
  const img=document.getElementById('card-img'); if(!img) return;
  img.style.transform=`translate(${panX}px,${panY}px) scale(${zoomScale}) rotate(${rotation}deg)`;
}
function resetZoom(){
  zoomScale=1;panX=0;panY=0;rotation=0;
  const img=document.getElementById('card-img'); if(img) img.style.transform='';
}
function tDist(t){const dx=t[0].clientX-t[1].clientX,dy=t[0].clientY-t[1].clientY;return Math.sqrt(dx*dx+dy*dy);}
function tMid(t){return{x:(t[0].clientX+t[1].clientX)/2,y:(t[0].clientY+t[1].clientY)/2};}
function tAngle(t){return Math.atan2(t[1].clientY-t[0].clientY,t[1].clientX-t[0].clientX)*180/Math.PI;}

cardWrap.addEventListener('touchstart',e=>{
  if(e.touches.length===2){isPinching=true;pinchStarted=false;e.preventDefault();}
},{passive:false});
cardWrap.addEventListener('touchmove',e=>{
  if(e.touches.length===2){
    e.preventDefault();
    const d=tDist(e.touches),m=tMid(e.touches),a=tAngle(e.touches);
    if(!pinchStarted){lastDist=d;lastMidX=m.x;lastMidY=m.y;lastAngle=a;pinchStarted=true;return;}
    zoomScale=Math.min(6,Math.max(1,zoomScale*(d/lastDist)));
    panX+=m.x-lastMidX;panY+=m.y-lastMidY;
    const mp=300*(zoomScale-1);
    panX=Math.max(-mp,Math.min(mp,panX));panY=Math.max(-mp,Math.min(mp,panY));
    rotation+=(a-lastAngle);
    applyZoom();
    lastDist=d;lastMidX=m.x;lastMidY=m.y;lastAngle=a;
  }
  if(e.touches.length===1&&zoomScale>1){
    e.preventDefault();
    const dx=e.touches[0].clientX-swipeStartX,dy=e.touches[0].clientY-swipeStartY;
    const mp=200*(zoomScale-1);
    panX=Math.max(-mp,Math.min(mp,panX+dx));
    panY=Math.max(-mp,Math.min(mp,panY+dy));
    applyZoom();
  }
},{passive:false});
cardWrap.addEventListener('touchend',e=>{
  if(e.touches.length<2){lastDist=null;lastAngle=null;setTimeout(()=>{isPinching=false;},50);}
  if(zoomScale<1)resetZoom();
});

// double tap to zoom / flip
let lastTap=0;
cardWrap.addEventListener('touchend',e=>{
  if(isPinching||e.touches.length>0)return;
  const now=Date.now();
  const touch=e.changedTouches[0];
  if(now-lastTap<300){
    e.preventDefault();
    if(!tutorialShown){
      tutorialShown=true;
      localStorage.setItem('pictour_tutorial','1');
      const h=document.getElementById('tutorial-hint');
      if(h)h.classList.add('used');
    }
    if(zoomScale>1.05){resetZoom();}
    else{
      const rect=cardWrap.getBoundingClientRect();
      const tx=touch.clientX-rect.left-rect.width/2;
      const ty=touch.clientY-rect.top-rect.height/2;
      zoomScale=3;panX=-tx*(3-1)*0.5;panY=-ty*(3-1)*0.5;
      applyZoom();
    }
  } else if(mode==='flash'&&zoomScale<=1.05&&!isSwiping){
    // single tap flips card
    setTimeout(()=>{
      if(Date.now()-lastTap>250) document.getElementById('card-wrap').classList.toggle('flipped');
    },260);
  }
  lastTap=now;
},{passive:false});

// keyboard
document.addEventListener('keydown',e=>{
  if(document.getElementById('app-screen').classList.contains('active')){
    if(e.key===' '&&mode==='flash') document.getElementById('card-wrap').classList.toggle('flipped');
    if(e.key==='ArrowRight'&&mode==='flash') markCorrect();
    if(e.key==='ArrowLeft'&&mode==='flash') markWrong();
  }
});

if(tutorialShown){
  const h=document.getElementById('tutorial-hint');
  if(h)h.classList.add('used');
}

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}

// ── START ──
loadTopics();
</script>
